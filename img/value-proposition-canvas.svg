<text x="906" y="536.6666666666666" text-anchor="start" style="font-family:Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif;font-size:14px;font-weight:400;fill:#2A3A53;">•  Procesos manuales y duplicados en Excel</text>
<text x="906" y="561.6666666666666" text-anchor="start" style="font-family:Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif;font-size:14px;font-weight:400;fill:#2A3A53;">•  Sin visibilidad en tiempo real</text>
<text x="906" y="586.6666666666666" text-anchor="start" style="font-family:Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif;font-size:14px;font-weight:400;fill:#2A3A53;">•  ERPs grandes caros y complejos</text>
