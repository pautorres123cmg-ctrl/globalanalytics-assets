<text x="906" y="282.0" text-anchor="start" style="font-family:Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif;font-size:14px;font-weight:400;fill:#2A3A53;">•  Gestionar ventas, stock, clientes y facturación</text>
<text x="906" y="307.0" text-anchor="start" style="font-family:Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif;font-size:14px;font-weight:400;fill:#2A3A53;">•  Decidir con información confiable</text>
<text x="906" y="332.0" text-anchor="start" style="font-family:Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif;font-size:14px;font-weight:400;fill:#2A3A53;">•  Profesionalizar la operación al crecer</text>
<rect x="888" y="470.66666666666663" width="644" height="240.66666666666666" rx="14" fill="#FFFFFF" stroke="#1E5BFF" stroke-opacity="0.35" stroke-width="1.5"/>
