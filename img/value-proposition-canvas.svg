<text x="906" y="791.3333333333333" text-anchor="start" style="font-family:Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif;font-size:14px;font-weight:400;fill:#2A3A53;">•  Ahorro de tiempo y menos errores</text>
<text x="906" y="816.3333333333333" text-anchor="start" style="font-family:Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif;font-size:14px;font-weight:400;fill:#2A3A53;">•  Dashboards claros para decidir</text>
