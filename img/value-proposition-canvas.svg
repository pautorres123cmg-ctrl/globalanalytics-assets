<text x="86" y="791.3333333333333" text-anchor="start" style="font-family:Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif;font-size:14px;font-weight:400;fill:#2A3A53;">•  Personalización rápida al rubro del cliente</text>
<text x="86" y="816.3333333333333" text-anchor="start" style="font-family:Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif;font-size:14px;font-weight:400;fill:#2A3A53;">•  Soporte humano y cercano</text>
<text x="86" y="841.3333333333333" text-anchor="start" style="font-family:Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif;font-size:14px;font-weight:400;fill:#2A3A53;">•  Mejora continua del sistema</text>
<rect x="888" y="216.0" width="644" height="240.66666666666666" rx="14" fill="#FFFFFF" stroke="#0A1D3D" stroke-opacity="0.35" stroke-width="1.5"/>
