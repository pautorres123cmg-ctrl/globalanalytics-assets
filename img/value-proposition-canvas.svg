<text x="86" y="586.6666666666666" text-anchor="start" style="font-family:Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif;font-size:14px;font-weight:400;fill:#2A3A53;">•  Precio accesible y a medida → sin pagar de más</text>
<rect x="68" y="725.3333333333333" width="644" height="240.66666666666666" rx="14" fill="#FFFFFF" stroke="#0B9B8E" stroke-opacity="0.35" stroke-width="1.5"/>
