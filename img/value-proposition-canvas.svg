<text x="1560" y="75" text-anchor="end" style="font-family:Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif;font-size:13px;font-weight:400;fill:#5A6A82;">Encaje entre oferta y necesidad</text>
